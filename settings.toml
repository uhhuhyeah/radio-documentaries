# radio-documentaries pipeline settings — the ONE place to change models & voices.
# Edit here, then run the pipeline. Env vars (DOCS_RESEARCH_MODEL / DOCS_WRITE_MODEL /
# DOCS_PRODUCER_MODEL / DOCS_LLM_TIMEOUT_MS) override the matching value when set.

[models]
# OpenRouter model ids (https://openrouter.ai/models). qwen3-30b is fast + clean for
# bulk synthesis/writing; qwen3-235b is richer but slow. Running everything on 235b while
# iterating on output quality — drop research/write back to 30b for cheaper/faster batches.
research = "qwen/qwen3-235b-a22b-2507"
write    = "qwen/qwen3-235b-a22b-2507"
producer = "qwen/qwen3-235b-a22b-2507"
# Fact-checks the research draft against the fetched sources (quarantines inferred/weak-source
# claims). The 235b does sharper checking (catches mis-credits, doesn't garble names) at more cost.
verify   = "qwen/qwen3-235b-a22b-2507"
timeout_ms = 560000

[elevenlabs]
# Default TTS model stamped into new scripts' front matter (per-episode front matter wins;
# `render --model` overrides at render time). eleven_flash_v2_5 ≈0.5 cr/char; eleven_multilingual_v2 ≈1.
model = "eleven_flash_v2_5"

[budget]
# Credit hard-stop (src/credit.ts): before a render, the estimated credit need is checked
# against the key's live balance AND this per-episode cap; if the render can't finish or
# exceeds the cap, it's refused BEFORE any TTS call (no partial episodes). ~9k credits/episode
# observed; 15000 leaves headroom. Env: DOCS_PER_EPISODE_CAP overrides.
per_episode_cap = 15000

# Where rendered audio is copied onto the NAS Music share, used by `pnpm cli stage-audio`.
# Files go to <music_dir>/<episode-dir-name>/. Two modes:
#   local = false (default, dev box): rsync over SSH to ssh_host, which must have the Music share
#           mounted READ-WRITE (the PVE host; Navidrome's LXC mount is read-only).
#   local = true (the pipeline LXC): the share is bind-mounted read-write here, so copy straight to
#           music_dir — no SSH. Set music_dir to the local mount, e.g. /mnt/music/subwave-documentaries.
# Env overrides: DOCS_NAS_LOCAL (1/true) / DOCS_NAS_MUSIC_DIR / DOCS_NAS_SSH_HOST.
[nas]
local = false
ssh_host = "root@100.110.0.9"
music_dir = "/mnt/nas/music/subwave-documentaries"

# MCP HTTP server (`pnpm mcp`, src/mcp.ts). Exposes documentaryTools over Streamable HTTP so
# Hermes (CTID 105) can register it as a remote toolset:
#   hermes mcp add subwave --url http://<pipeline-lxc>:8848/mcp --auth header
# Binds 0.0.0.0 (Hermes connects cross-LXC over the LAN). Env: DOCS_MCP_PORT overrides the port.
# The bearer token is a SECRET and stays env-only (DOCS_MCP_TOKEN in .env) — never in this file.
[mcp]
port = 8848

# Where the pipeline creates episode working dirs (research.md, script.md, audio/…). The tools own
# this path so a remote orchestrator (Hermes) never invents one. Defaults to the repo root; set it
# (or DOCS_WORK_DIR) to a service-user-writable dir if the repo checkout isn't writable on a box.
# [work]
# dir = "/opt/radio-documentaries"

# Per-persona ElevenLabs voice (from subwave-config). Keys are persona ids.
[voices.p_cara]
voice_id = "ZF6FPAbjXT4488VcRRnw"  # "Amelia"
speed = 1.1

[voices.p_jools]
voice_id = "1BUhH8aaMvGMUdGAmWVM"  # "Alyx"
speed = 1.0
