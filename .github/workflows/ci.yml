name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. a force-push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # version comes from the packageManager field

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # seasons.md is a local-only artifact (gitignored); seed it from the example
      # so the catalog-backed tests have a live catalog to read.
      - name: Seed local catalog
        run: cp seasons.example.md seasons.md

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
